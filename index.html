<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/23.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fa" />
    <script>
      // Apply saved theme before first paint to avoid a flash. Defaults to light.
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0a0a0b');
      }
    </script>

    <!-- Speed up Google Fonts fetch (index.css @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>CodeSymphony.tech</title>
    <meta name="description" content="CodeSymphony is a software development agency turning complex code into beautiful solutions. Custom software, mobile apps, cloud solutions, and digital transformation." />
    <link rel="canonical" href="https://codesymphony-33f8f.web.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CodeSymphony" />
    <meta property="og:title" content="CodeSymphony — Software Development Agency" />
    <meta property="og:description" content="Turning complex code into beautiful solutions. Custom software, mobile apps, cloud solutions, and digital transformation." />
    <meta property="og:url" content="https://codesymphony-33f8f.web.app/" />
    <meta property="og:image" content="https://codesymphony-33f8f.web.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeSymphony — Software Development Agency" />
    <meta name="twitter:description" content="Turning complex code into beautiful solutions. Custom software, mobile apps, cloud solutions, and digital transformation." />
    <meta name="twitter:image" content="https://codesymphony-33f8f.web.app/og-image.png" />

    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CodeSymphony",
      "url": "https://codesymphony-33f8f.web.app/",
      "logo": "https://codesymphony-33f8f.web.app/apple-touch-icon.png",
      "description": "A software development agency turning complex code into beautiful solutions.",
      "foundingDate": "2025",

        "https://www.linkedin.com/company/codesymphony-inc/"
      ]

    </script>
  </head>

</html>
